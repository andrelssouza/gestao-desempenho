<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão de Desempenho - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); overflow: hidden; }
    .auth-container { display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px; }
    .auth-card { background: white; border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); padding: 40px; width: 100%; max-width: 400px; text-align: center; }
    .logo { font-size: 28px; font-weight: 700; color: #6d5ae6; margin-bottom: 8px; }
    .subtitle { color: #6b7280; margin-bottom: 32px; font-size: 14px; }
    .form-group { margin-bottom: 20px; text-align: left; }
    .form-label { display: block; font-size: 14px; font-weight: 500; color: #374151; margin-bottom: 6px; }
    .form-input { width: 100%; padding: 12px 16px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 16px; transition: border-color 0.2s; }
    .form-input:focus { outline: none; border-color: #6d5ae6; }
    .btn { width: 100%; padding: 12px 16px; border: none; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; transition: all 0.2s; margin-bottom: 16px; }
    .btn-primary { background: #6d5ae6; color: white; }
    .btn-secondary { background: #f3f4f6; color: #374151; }
    .divider { margin: 24px 0; position: relative; text-align: center; }
    .divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: #e5e7eb; }
    .divider-text { background: white; padding: 0 16px; font-size: 14px; color: #6b7280; position: relative; z-index: 1; }
    .link-btn { background: none; border: none; color: #6d5ae6; text-decoration: underline; font-size: 12px; cursor: pointer; margin-top: 10px; }
    .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; display: none; background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="logo">Gestão de Desempenho</div>
      <div class="subtitle">Sistema de Gestão de Performance</div>

      <div id="alert-box" class="alert"></div>

      <div id="box-login">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="l-email" class="form-input" placeholder="seu@email.com">
        </div>
        <div class="form-group">
          <label class="form-label">Senha</label>
          <input type="password" id="l-pass" class="form-input" placeholder="••••••••">
        </div>
        <button id="btn-entrar" class="btn btn-primary">Entrar</button>
        <div class="divider"><span class="divider-text">ou</span></div>
        <button id="go-to-reg" class="btn btn-secondary">Criar conta</button>
        <button id="btn-skip" class="link-btn" style="color: #6b7280;">Pular autenticação (visualizar)</button>
      </div>

      <div id="box-register" style="display: none;">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="r-email" class="form-input" placeholder="seu@email.com">
        </div>
        <div class="form-group">
          <label class="form-label">Senha</label>
          <input type="password" id="r-pass" class="form-input" placeholder="Mínimo 6 caracteres">
        </div>
        <button id="btn-criar" class="btn btn-primary">Criar minha conta</button>
        <div class="divider"><span class="divider-text">ou</span></div>
        <button id="go-to-log" class="btn btn-secondary">Já tenho conta</button>
      </div>
    </div>
  </div>

  <script>
    const boxLogin = document.getElementById('box-login');
    const boxReg = document.getElementById('box-register');
    const alertBox = document.getElementById('alert-box');

    function showMsg(txt) {
      alertBox.textContent = txt;
      alertBox.style.display = 'block';
    }

    // Alternar telas
    document.getElementById('go-to-reg').onclick = () => {
      boxLogin.style.display = 'none';
      boxReg.style.display = 'block';
      alertBox.style.display = 'none';
    };

    document.getElementById('go-to-log').onclick = () => {
      boxReg.style.display = 'none';
      boxLogin.style.display = 'block';
      alertBox.style.display = 'none';
    };

    // Pular
    document.getElementById('btn-skip').onclick = () => {
      localStorage.setItem('skipAuth', 'true');
      localStorage.setItem('user', JSON.stringify({ email: 'convidado@teste.com' }));
      window.location.href = 'gestao_desempenho_v3.html';
    };

    // Ação de Autenticação
    async function enviar(email, password) {
      if(!email || !password) return showMsg("Preencha os campos!");
      
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if(res.ok) {
          localStorage.setItem('user', JSON.stringify(data.user));
          localStorage.setItem('token', data.token);
          localStorage.removeItem('skipAuth');
          window.location.href = 'gestao_desempenho_v3.html';
        } else {
          showMsg(data.error || "Erro ao entrar");
        }
      } catch(e) {
        showMsg("Erro de conexão com o servidor");
      }
    }

    document.getElementById('btn-entrar').onclick = () => {
      enviar(document.getElementById('l-email').value, document.getElementById('l-pass').value);
    };

    document.getElementById('btn-criar').onclick = () => {
      enviar(document.getElementById('r-email').value, document.getElementById('r-pass').value);
    };
  </script>
</body>
</html>
