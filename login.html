<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão de Desempenho - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); overflow: hidden; }
    .auth-container { display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px; }
    .auth-card { background: white; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    .logo { font-size: 24px; font-weight: 700; color: #6d5ae6; margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; text-align: left; }
    .form-label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
    .form-input { width: 100%; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; }
    .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .btn-primary { background: #6d5ae6; color: white; }
    .alert { padding: 10px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; display: none; }
    .alert-error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="logo">Gestão de Desempenho</div>
      <div id="alert" class="alert alert-error"></div>
      <div class="form-group">
        <label class="form-label">E-mail</label>
        <input type="email" id="email" class="form-input" placeholder="seu@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••">
      </div>
      <button id="login-btn" class="btn btn-primary">Entrar ou Criar Conta</button>
      <p style="margin-top: 16px; font-size: 12px; color: #6b7280;">Os dados serão salvos no seu e-mail.</p>
    </div>
  </div>

  <script>
    const btn = document.getElementById('login-btn');
    const alertBox = document.getElementById('alert');

    btn.onclick = async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if(!email || !password) {
        alertBox.textContent = "Preencha todos os campos";
        alertBox.style.display = "block";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Carregando...";

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('user', JSON.stringify(data.user));
          localStorage.setItem('token', data.token);
          window.location.href = 'gestao_desempenho_v3.html';
        } else {
          alertBox.textContent = data.error || "Erro ao entrar";
          alertBox.style.display = "block";
        }
      } catch (e) {
        alertBox.textContent = "Erro de conexão com o servidor";
        alertBox.style.display = "block";
      } finally {
        btn.disabled = false;
        btn.textContent = "Entrar ou Criar Conta";
      }
    };
  </script>
</body>
</html>
