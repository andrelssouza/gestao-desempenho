const med=a=>a.reduce((x,y)=>x+y,0)/a.length;
const avg=c=>((med(c.softSkills)+med(c.hardSkills))/2).toFixed(1);

function RadarSingle({skills,labels,cor,fill,dark}){
  const cx=100,cy=95,r=62,n=skills.length;
  const pt=(vals)=>vals.map((_,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2,v=(vals[i]/10)*r;return[cx+v*Math.cos(a),cy+v*Math.sin(a)];});
  const poly=p=>p.map(x=>x.join(",")).join(" ");
  const grid=f=>Array.from({length:n},(_,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2;return[cx+r*f*Math.cos(a),cy+r*f*Math.sin(a)];});
  const lp=Array.from({length:n},(_,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2;return[cx+(r+18)*Math.cos(a),cy+(r+18)*Math.sin(a)];});
  const gc=dark?"rgba(255,255,255,0.12)":"#ddd",tc=dark?"#aaa":"#888";
  const pts=pt(skills);
  return cr("svg",{viewBox:"0 0 220 210",style:{width:"100%",maxWidth:"280px",margin:"0 auto",display:"block"}},
    ...[0.25,0.5,0.75,1].map(f=>cr("polygon",{key:f,points:poly(grid(f)),fill:"none",stroke:gc,strokeWidth:"0.8"})),
    ...Array.from({length:n},(_,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2;return cr("line",{key:i,x1:cx,y1:cy,x2:cx+r*Math.cos(a),y2:cy+r*Math.sin(a),stroke:gc,strokeWidth:"0.8"});}),
    cr("polygon",{points:poly(pts),fill:fill,stroke:cor,strokeWidth:2}),
    ...pts.map((p,i)=>cr("circle",{key:"c"+i,cx:p[0],cy:p[1],r:3,fill:cor})),
    ...lp.map((p,i)=>cr("text",{key:"l"+i,x:p[0],y:p[1],textAnchor:"middle",dominantBaseline:"middle",fontSize:8.5,fill:tc},labels[i])),
    ...pts.map((p,i)=>{
      const ox=p[0]>cx+5?7:p[0]<cx-5?-7:0,oy=p[1]>cy+5?9:p[1]<cy-5?-9:0;
      return cr("text",{key:"v"+i,x:p[0]+ox,y:p[1]+oy,textAnchor:"middle",fontSize:7.5,fontWeight:"bold",fill:cor},MAT[Math.min(4, Math.floor(skills[i]/2))].slice(0,4));
    })
  );
}
